name: Mobile Cloud Compiler

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Check Out Code
      uses: actions/checkout@v4

    - name: Clean Up Space
      uses: rokibhasansagar/slimhub_actions@main

    - name: Initialize Workspace
      run: |
        mkdir workspace
        cd workspace
        echo "Workspace Initialized"

    - name: Prepare Build Environment
      run: |
        sudo apt update
        sudo apt -y install git-core gnupg flex bison gperf build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses-dev x11proto-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig

    - name: Install Repo
      run: |
        mkdir ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Sync TWRP Source (Minimal)
      run: |
        cd workspace
        repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Clone Your Device Tree
      run: |
        cd workspace
        git clone https://github.com/jashan-see/twrp_device_nothing_galaga.git device/nothing/galaga

    - name: Compile Recovery
      run: |
        cd workspace
        export ALLOW_MISSING_DEPENDENCIES=true
        source build/envsetup.sh
        
        # --- SHERLOCK HOLMES DETECTOR ---
        echo "Debugging: Listing files in device tree..."
        ls -R device/nothing/galaga
        
        echo "Reading AndroidProducts.mk..."
        # Extract the exact lunch combo
        if [ -f device/nothing/galaga/AndroidProducts.mk ]; then
            LUNCH_COMBO=$(grep "COMMON_LUNCH_CHOICES" device/nothing/galaga/AndroidProducts.mk | cut -d ":" -f 2 | cut -d "-" -f 1 | tr -d '[:space:]')
        fi
        
        # Fallback
        if [ -z "$LUNCH_COMBO" ]; then
            echo "Warning: Could not read AndroidProducts.mk. Trying generic fallback..."
            LUNCH_COMBO="omni_galaga"
        fi
        
        echo "TARGET DETECTED: $LUNCH_COMBO"
        lunch ${LUNCH_COMBO}-eng
        mka recoveryimage

    - name: Upload Recovery Image
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-Recovery
        path: workspace/out/target/product/galaga/recovery.img
