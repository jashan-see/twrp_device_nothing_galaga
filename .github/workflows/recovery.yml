name: Mobile Cloud Compiler

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Check Out Code
      uses: actions/checkout@v4

    - name: Clean Up Space
      uses: rokibhasansagar/slimhub_actions@main

    - name: Initialize Workspace
      run: |
        mkdir workspace
        cd workspace
        echo "Workspace Initialized"

    - name: Prepare Build Environment
      run: |
        sudo apt update
        sudo apt -y install git-core gnupg flex bison gperf build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses-dev x11proto-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig

    - name: Install Repo
      run: |
        mkdir ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Sync TWRP Source (Minimal)
      run: |
        cd workspace
        repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Clone Your Device Tree
      run: |
        cd workspace
        git clone https://github.com/jashan-see/twrp_device_nothing_galaga.git device/nothing/galaga

    - name: Compile Recovery
      run: |
        cd workspace
        export ALLOW_MISSING_DEPENDENCIES=true
        source build/envsetup.sh
        
        # --- ARCHITECT FIX V16: DIMENSIONS ---
        echo "⚠️ Setting Partition Sizes..."
        cd device/nothing/galaga
        
        # 1. Create Dummy Kernel (10MB)
        dd if=/dev/zero of=kernel bs=1M count=10
        
        # 2. BoardConfig.mk (The Blueprint)
        echo 'DEVICE_PATH := device/nothing/galaga' > BoardConfig.mk
        echo 'TARGET_ARCH := arm64' >> BoardConfig.mk
        echo 'TARGET_ARCH_VARIANT := armv8-a' >> BoardConfig.mk
        echo 'TARGET_CPU_ABI := arm64-v8a' >> BoardConfig.mk
        echo 'TARGET_CPU_VARIANT := generic' >> BoardConfig.mk
        echo 'TARGET_BOARD_PLATFORM := mt6886' >> BoardConfig.mk
        echo 'TARGET_NO_BOOTLOADER := true' >> BoardConfig.mk
        echo 'TARGET_USES_UEFI := true' >> BoardConfig.mk
        echo 'BOARD_HAS_LARGE_FILESYSTEM := true' >> BoardConfig.mk
        echo 'TARGET_SUPPORTS_64_BIT_APPS := true' >> BoardConfig.mk
        echo 'TARGET_SCREEN_WIDTH := 1080' >> BoardConfig.mk
        echo 'TARGET_SCREEN_HEIGHT := 2400' >> BoardConfig.mk
        echo 'TW_THEME := portrait_hdpi' >> BoardConfig.mk
        
        # --- THE FIX: PARTITION SIZES ---
        echo 'BOARD_BOOTIMAGE_PARTITION_SIZE := 67108864' >> BoardConfig.mk
        echo 'BOARD_RECOVERYIMAGE_PARTITION_SIZE := 67108864' >> BoardConfig.mk
        echo 'BOARD_SYSTEMIMAGE_PARTITION_SIZE := 3221225472' >> BoardConfig.mk
        echo 'BOARD_USERDATAIMAGE_PARTITION_SIZE := 3221225472' >> BoardConfig.mk
        echo 'BOARD_FLASH_BLOCK_SIZE := 131072' >> BoardConfig.mk
        
        # --- THE FIX: HARDCODED KERNEL PATH ---
        echo 'TARGET_PREBUILT_KERNEL := device/nothing/galaga/kernel' >> BoardConfig.mk
        echo 'BOARD_KERNEL_IMAGE_NAME := Image' >> BoardConfig.mk
        
        # 3. Android.mk (The Anchor)
        echo 'LOCAL_PATH := $(call my-dir)' > Android.mk
        echo 'include $(call all-makefiles-under,$(LOCAL_PATH))' >> Android.mk

        # 4. Product (omni_galaga.mk)
        echo '$(call inherit-product, $(SRC_TARGET_DIR)/product/full_base.mk)' > omni_galaga.mk
        echo '$(call inherit-product, device/nothing/galaga/device.mk)' >> omni_galaga.mk
        echo 'PRODUCT_DEVICE := galaga' >> omni_galaga.mk
        echo 'PRODUCT_NAME := omni_galaga' >> omni_galaga.mk
        echo 'PRODUCT_BRAND := Nothing' >> omni_galaga.mk
        echo 'PRODUCT_MODEL := CMF Phone 2 Pro' >> omni_galaga.mk
        
        # 5. Clean Device Config
        echo '$(call inherit-product, $(SRC_TARGET_DIR)/product/languages_full.mk)' > device.mk
        
        # 6. Menu (AndroidProducts.mk)
        echo 'PRODUCT_MAKEFILES := $(LOCAL_DIR)/omni_galaga.mk' > AndroidProducts.mk
        echo 'COMMON_LUNCH_CHOICES := omni_galaga-eng' >> AndroidProducts.mk
        
        cd ../../..
        
        # --- BUILD START ---
        echo "🚀 Starting Build..."
        lunch omni_galaga-eng
        mka recoveryimage || echo "❌ BUILD FAILED!"
        
        # --- DEBUG CHECK ---
        echo "🔎 Checking output..."
        find out/target/product/galaga -name "recovery.img"

    - name: Upload Recovery Image
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-Recovery
        path: workspace/out/target/product/galaga/recovery.img
        if-no-files-found: error
